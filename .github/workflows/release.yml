name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rename_script: rename-windows.sh
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rename_script: rename-macos.sh
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rename_script: rename-macos.sh
          - platform: ubuntu-22.04
            args: ''
            rename_script: rename-linux.sh
          - platform: ubuntu-24.04-arm
            args: ''
            rename_script: rename-linux.sh

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci

      - name: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: rename installers
        run: bash scripts/${{ matrix.rename_script }}

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '橙记 ${{ github.ref_name }}'
          body: |
            ## 橙记 ${{ github.ref_name }}

            **一目了然，橙就高效。** 橙记是一款轻量高效的桌面便签应用，基于 Tauri 2 构建，数据本地存储，支持多语言、标签管理、定时提醒等功能。

            ### 📦 下载安装

            | 平台 | 架构 | 安装包 |
            |------|------|--------|
            | Windows | x64 | `OrangeNote-${{ github.ref_name }}-Windows-x64-setup.exe` (NSIS) |
            | Windows | x64 | `OrangeNote-${{ github.ref_name }}-Windows-x64.msi` (MSI) |
            | macOS | Apple Silicon (M1/M2/M3) | `OrangeNote-${{ github.ref_name }}-macOS-aarch64.dmg` |
            | macOS | Intel | `OrangeNote-${{ github.ref_name }}-macOS-x64.dmg` |
            | Linux | x64 | `OrangeNote-${{ github.ref_name }}-Linux-amd64.AppImage` |
            | Linux | ARM64 | `OrangeNote-${{ github.ref_name }}-Linux-aarch64.AppImage` |

            ### 🔄 自动更新

            应用内置自动更新功能，启动时会自动检测新版本并静默下载。也可在 **设置 → 检查更新** 手动触发。

            ### 🛠 技术栈

            - **前端：** React 19 + TypeScript + Vite + Tailwind CSS 4
            - **后端：** Rust + Tauri 2 + SQLite
            - **支持平台：** Windows 10+、macOS 12+、Ubuntu 22.04+
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  updater-manifest:
    needs: publish
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          API_URL="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          REPO_URL="https://github.com/${REPO}/releases/download/${TAG}"

          echo "=== Fetching release info ==="
          RELEASE_JSON=$(curl -sH "Authorization: token ${GITHUB_TOKEN}" "$API_URL")
          echo "Release: $(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name','?'))" 2>/dev/null)"

          mkdir -p assets

          # Download each binary and its .sig file
          download_asset() {
            local name="$1"
            local url="$2"
            echo "Downloading: $name"
            curl -sL -o "assets/${name}" "$url"
            if [ -f "assets/${name}" ]; then
              echo "  OK: $(wc -c < assets/${name}) bytes"
            else
              echo "  FAILED"
            fi
          }

          # Get asset URLs from release JSON and download binaries + sigs
          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for asset in data.get('assets', []):
              name = asset['name']
              url = asset['browser_download_url']
              if name.endswith('.exe') or name.endswith('.msi') or name.endswith('.dmg') or name.endswith('.AppImage') or name.endswith('.sig'):
                  print(f'{name}\t{url}')
          " | while IFS=$'\t' read -r name url; do
            download_asset "$name" "$url"
          done

          echo ""
          echo "=== Downloaded files ==="
          ls -la assets/

          # Find platform files
          find_binary() {
            local pattern="$1"
            local exclude="${2:-}"
            local result
            if [ -n "$exclude" ]; then
              result=$(ls assets/$pattern 2>/dev/null | grep -v "$exclude" | head -1)
            else
              result=$(ls assets/$pattern 2>/dev/null | head -1)
            fi
            if [ -n "$result" ]; then
              basename "$result"
            fi
          }

          echo ""
          echo "=== Finding platform files ==="

          WIN_EXE=$(find_binary "*Windows*.exe")
          [ -z "$WIN_EXE" ] && WIN_EXE=$(find_binary "*.exe")
          echo "WIN_EXE=$WIN_EXE"

          MAC_ARM=$(find_binary "*macOS*aarch64*.dmg")
          [ -z "$MAC_ARM" ] && MAC_ARM=$(find_binary "*aarch64*.dmg")
          echo "MAC_ARM=$MAC_ARM"

          MAC_X64=$(find_binary "*macOS*x64*.dmg" "aarch64")
          [ -z "$MAC_X64" ] && MAC_X64=$(find_binary "*x64*.dmg" "aarch64")
          echo "MAC_X64=$MAC_X64"

          LINUX_X64=$(find_binary "*Linux*amd64*.AppImage")
          [ -z "$LINUX_X64" ] && LINUX_X64=$(find_binary "*amd64*.AppImage")
          [ -z "$LINUX_X64" ] && LINUX_X64=$(find_binary "*.AppImage" "aarch64")
          echo "LINUX_X64=$LINUX_X64"

          LINUX_ARM=$(find_binary "*Linux*aarch64*.AppImage")
          [ -z "$LINUX_ARM" ] && LINUX_ARM=$(find_binary "*aarch64*.AppImage")
          echo "LINUX_ARM=$LINUX_ARM"

          # Build platform JSON entries
          build_entry() {
            local binary="$1"
            local key="$2"
            if [ -z "$binary" ]; then
              echo "SKIP: $key (no binary found)" >&2
              return
            fi
            local sig="assets/${binary}.sig"
            if [ ! -f "assets/${binary}" ]; then
              echo "SKIP: $key (binary not found: assets/${binary})" >&2
              return
            fi
            if [ ! -f "$sig" ]; then
              echo "SKIP: $key (sig not found: $sig)" >&2
              return
            fi
            local sig_content
            sig_content=$(cat "$sig" | tr -d '\n\r')
            echo "\"${key}\": {\"signature\": \"${sig_content}\", \"url\": \"${REPO_URL}/${binary}\"}"
          }

          echo ""
          echo "=== Building platforms JSON ==="

          PLATFORMS=""
          for entry in \
            "$(build_entry "$WIN_EXE" "windows-x86_64")" \
            "$(build_entry "$MAC_ARM" "darwin-aarch64")" \
            "$(build_entry "$MAC_X64" "darwin-x86_64")" \
            "$(build_entry "$LINUX_X64" "linux-x86_64")" \
            "$(build_entry "$LINUX_ARM" "linux-aarch64")"; do
            if [ -n "$entry" ] && [[ "$entry" != SKIP* ]]; then
              [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
              PLATFORMS="${PLATFORMS}${entry}"
            fi
          done

          cat > latest.json << EOJSON
          {
            "version": "${VERSION}",
            "notes": "橙记 ${TAG} — 一目了然，橙就高效。修复已知问题，优化用户体验。",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {${PLATFORMS}}
          }
          EOJSON

          echo ""
          echo "=== latest.json ==="
          cat latest.json

          # Validate JSON
          if ! python3 -m json.tool latest.json > /dev/null 2>&1; then
            echo "ERROR: Generated JSON is invalid!" >&2
            exit 1
          fi

          if [ -z "$PLATFORMS" ]; then
            echo "WARNING: No platforms found!" >&2
            exit 1
          fi

      - name: upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

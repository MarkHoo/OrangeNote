name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rename_script: rename-windows.sh
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rename_script: rename-macos.sh
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rename_script: rename-macos.sh
          - platform: ubuntu-22.04
            args: ''
            rename_script: rename-linux.sh
          - platform: ubuntu-24.04-arm
            args: ''
            rename_script: rename-linux.sh

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci

      - name: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: rename installers
        run: bash scripts/${{ matrix.rename_script }}

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '橙记 ${{ github.ref_name }}'
          body: |
            ## 橙记 ${{ github.ref_name }}

            **一目了然，橙就高效。** 橙记是一款轻量高效的桌面便签应用，基于 Tauri 2 构建，数据本地存储，支持多语言、标签管理、定时提醒等功能。

            ### 📦 下载安装

            | 平台 | 架构 | 安装包 |
            |------|------|--------|
            | Windows | x64 | `OrangeNote-${{ github.ref_name }}-Windows-x64-setup.exe` (NSIS) |
            | Windows | x64 | `OrangeNote-${{ github.ref_name }}-Windows-x64.msi` (MSI) |
            | macOS | Apple Silicon (M1/M2/M3) | `OrangeNote-${{ github.ref_name }}-macOS-aarch64.dmg` |
            | macOS | Intel | `OrangeNote-${{ github.ref_name }}-macOS-x64.dmg` |
            | Linux | x64 | `OrangeNote-${{ github.ref_name }}-Linux-amd64.AppImage` |
            | Linux | ARM64 | `OrangeNote-${{ github.ref_name }}-Linux-aarch64.AppImage` |

            ### 🔄 自动更新

            应用内置自动更新功能，启动时会自动检测新版本并静默下载。也可在 **设置 → 检查更新** 手动触发。

            ### 🛠 技术栈

            - **前端：** React 19 + TypeScript + Vite + Tailwind CSS 4
            - **后端：** Rust + Tauri 2 + SQLite
            - **支持平台：** Windows 10+、macOS 12+、Ubuntu 22.04+
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  updater-manifest:
    needs: publish
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          # Download all release assets using gh CLI
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" --dir assets --clobber
          # Remove latest.json if downloaded
          rm -f assets/latest.json
          echo "=== Downloaded files in assets/ ==="
          ls -la assets/
          echo ""
          echo "=== File count ==="
          ls assets/ | wc -l

      - name: generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_URL="https://github.com/MarkHoo/OrangeNote/releases/download/${GITHUB_REF_NAME}"

          build_platform_json() {
            local binary_name="$1"
            local platform_key="$2"
            local sig_file="assets/${binary_name}.sig"

            if [ -f "assets/${binary_name}" ] && [ -f "$sig_file" ]; then
              local sig_content
              sig_content=$(cat "$sig_file" | tr -d '\n\r')
              echo "\"${platform_key}\": {\"signature\": \"${sig_content}\", \"url\": \"${REPO_URL}/${binary_name}\"}"
            else
              echo "WARNING: Missing file for ${platform_key}" >&2
              [ ! -f "assets/${binary_name}" ] && echo "  -> binary not found: assets/${binary_name}" >&2
              [ ! -f "$sig_file" ] && echo "  -> signature not found: ${sig_file}" >&2
            fi
          }

          echo "=== Searching for platform files ==="

          # Windows NSIS (.exe)
          WIN_EXE=$(ls assets/OrangeNote-v*Windows*.exe 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$WIN_EXE" ] && WIN_EXE=$(ls assets/OrangeNote-v*.exe 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$WIN_EXE" ] && WIN_EXE=$(ls assets/*.exe 2>/dev/null | head -1 | xargs -r basename)
          echo "WIN_EXE=$WIN_EXE"

          # macOS ARM64 (.dmg with aarch64)
          MAC_ARM=$(ls assets/OrangeNote-v*macOS*aarch64*.dmg 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$MAC_ARM" ] && MAC_ARM=$(ls assets/*aarch64*.dmg 2>/dev/null | head -1 | xargs -r basename)
          echo "MAC_ARM=$MAC_ARM"

          # macOS x64 (.dmg with x64, not aarch64)
          MAC_X64=$(ls assets/OrangeNote-v*macOS*x64*.dmg 2>/dev/null | grep -v aarch64 | head -1 | xargs -r basename)
          [ -z "$MAC_X64" ] && MAC_X64=$(ls assets/*x64*.dmg 2>/dev/null | grep -v aarch64 | head -1 | xargs -r basename)
          echo "MAC_X64=$MAC_X64"

          # Linux x86_64 (.AppImage with amd64)
          LINUX_X64=$(ls assets/OrangeNote-v*Linux*amd64*.AppImage 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$LINUX_X64" ] && LINUX_X64=$(ls assets/*amd64*.AppImage 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$LINUX_X64" ] && LINUX_X64=$(ls assets/OrangeNote-v*.AppImage 2>/dev/null | grep -v aarch64 | head -1 | xargs -r basename)
          echo "LINUX_X64=$LINUX_X64"

          # Linux ARM64 (.AppImage with aarch64)
          LINUX_ARM=$(ls assets/OrangeNote-v*Linux*aarch64*.AppImage 2>/dev/null | head -1 | xargs -r basename)
          [ -z "$LINUX_ARM" ] && LINUX_ARM=$(ls assets/*aarch64*.AppImage 2>/dev/null | head -1 | xargs -r basename)
          echo "LINUX_ARM=$LINUX_ARM"

          echo ""
          echo "=== Building platforms JSON ==="

          PLATFORMS=""
          for entry in \
            "$(build_platform_json "$WIN_EXE" "windows-x86_64")" \
            "$(build_platform_json "$MAC_ARM" "darwin-aarch64")" \
            "$(build_platform_json "$MAC_X64" "darwin-x86_64")" \
            "$(build_platform_json "$LINUX_X64" "linux-x86_64")" \
            "$(build_platform_json "$LINUX_ARM" "linux-aarch64")"; do
            if [ -n "$entry" ] && [[ "$entry" != WARNING* ]]; then
              [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
              PLATFORMS="${PLATFORMS}${entry}"
            fi
          done

          cat > latest.json << EOJSON
          {
            "version": "${VERSION}",
            "notes": "橙记 ${GITHUB_REF_NAME} — 一目了然，橙就高效。修复已知问题，优化用户体验。",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {${PLATFORMS}}
          }
          EOJSON

          echo ""
          echo "=== latest.json ==="
          cat latest.json

          # Validate JSON
          if ! python3 -m json.tool latest.json > /dev/null 2>&1; then
            echo "ERROR: Generated JSON is invalid!" >&2
            exit 1
          fi

          if [ -z "$PLATFORMS" ]; then
            echo "WARNING: No platforms found!" >&2
          fi

      - name: upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
